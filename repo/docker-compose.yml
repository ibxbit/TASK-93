services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: motorsport-backend:latest
    container_name: motorsport-backend
    restart: unless-stopped

    ports:
      - "8000:8000"

    # Sandbox defaults — override any of these via a real .env file or
    # CI/CD secrets for production deployments.
    environment:
      DATABASE_URL: sqlite:///app/data/motorsport.db
      HOST: 0.0.0.0
      PORT: "8000"
      LOG_LEVEL: info
      BACKUP_RETAIN_DAYS: "7"
      BACKUP_DIR: /app/backups
      # 32-byte sandbox key (Base64).  REPLACE with a securely-generated
      # value before any non-sandbox deployment.
      ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

    volumes:
      # SQLite database file — survives container restarts.
      - motorsport_data:/app/data
      # Structured JSON logs — consumed externally or rotated by log driver.
      - motorsport_logs:/app/logs
      # Nightly SQLite backup files — retained for BACKUP_RETAIN_DAYS days.
      - motorsport_backups:/app/backups

      # Migration config and scripts for sea-orm-cli
      - ./sea-orm-cli.toml:/app/sea-orm-cli.toml:ro
      - ./src/migration:/app/src/migration:ro

    # Hard limits prevent runaway resource usage on a shared host.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"    # aligns with BACKUP_RETAIN_DAYS default

  # Rust build/test container for running cargo test (has cargo and build deps)
  tester:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: motorsport-backend-builder:latest
    container_name: motorsport-backend-tester
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ["/bin/bash", "-c"]
    command: ["cargo test --release"]
    environment:
      DATABASE_URL: sqlite:///app/data/motorsport.db
      HOST: 0.0.0.0
      PORT: "8000"
      LOG_LEVEL: info
      BACKUP_RETAIN_DAYS: "7"
      BACKUP_DIR: /app/backups
      ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

  # Integration test runner — used for automated validation.
  # Run with: docker compose run --rm integration-test
  # The `test` profile prevents this service from starting with `docker compose up`.
  #
  # pytest-cov produces three artifacts under ./coverage_reports/:
  #   - term summary (stdout)
  #   - HTML report  (coverage_reports/html/index.html)
  #   - XML report   (coverage_reports/coverage.xml, for CI ingestion)
  integration-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: motorsport-test-runner
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - API_URL=http://backend:8000
    command: >-
      pytest unit_tests/ API_tests/ -v
      --cov
      --cov-branch
      --cov-report=term-missing
      --cov-report=html:coverage_reports/html
      --cov-report=xml:coverage_reports/coverage.xml

volumes:
  motorsport_data:
    driver: local
  motorsport_logs:
    driver: local
  motorsport_backups:
    driver: local
